services:
  - type: web
    name: github-repo-summarizer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        sync: false
      - key: NEBIUS_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
