<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Summarizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .result-section {
            margin-bottom: 20px;
        }
        .result-section h3 {
            color: #555;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        .result-section p {
            color: #333;
            line-height: 1.6;
        }
        .technologies {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .tech-tag {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        .error {
            background: #fee;
            border: 2px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 20px;
            display: none;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 GitHub Repo Summarizer</h1>
        <p class="subtitle">Analyze any GitHub repository with AI</p>
        
        <div class="input-group">
            <label for="githubUrl">GitHub Repository URL</label>
            <input 
                type="text" 
                id="githubUrl" 
                placeholder="https://github.com/owner/repo"
                value="https://github.com/psf/requests"
            >
        </div>
        
        <button id="summarizeBtn" onclick="summarize()">Summarize Repository</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing repository...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <h2>📊 Analysis Results</h2>
            
            <div class="result-section">
                <h3>Summary</h3>
                <p id="summary"></p>
            </div>
            
            <div class="result-section">
                <h3>Technologies</h3>
                <div class="technologies" id="technologies"></div>
            </div>
            
            <div class="result-section">
                <h3>Project Structure</h3>
                <p id="structure"></p>
            </div>
        </div>
    </div>

    <script>
        async function summarize() {
            const url = document.getElementById('githubUrl').value.trim();
            const btn = document.getElementById('summarizeBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            
            // Validate input
            if (!url) {
                showError('Please enter a GitHub URL');
                return;
            }
            
            // Reset UI
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');
            btn.disabled = true;
            
            try {
                const response = await fetch('/summarize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ github_url: url })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Failed to summarize repository');
                }
                
                // Display results
                document.getElementById('summary').textContent = data.summary;
                document.getElementById('structure').textContent = data.structure;
                
                const techContainer = document.getElementById('technologies');
                techContainer.innerHTML = '';
                data.technologies.forEach(tech => {
                    const tag = document.createElement('span');
                    tag.className = 'tech-tag';
                    tag.textContent = tech;
                    techContainer.appendChild(tag);
                });
                
                result.classList.add('show');
            } catch (err) {
                showError(err.message);
            } finally {
                loading.classList.remove('show');
                btn.disabled = false;
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
        
        // Allow Enter key to submit
        document.getElementById('githubUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                summarize();
            }
        });
    </script>
</body>
</html>
